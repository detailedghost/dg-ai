    <path d="M30 98 V64 A34 34 0 0 1 98 64 V98 L89.5 88 L81 98 L72.5 88 L64 98 L55.5 88 L47 98 L38.5 88 Z"
          fill="url(#sheen)"/>
    <!-- eyes -->
    <ellipse cx="54" cy="60" rx="9" ry="11" fill="#ffffff"/>
    <ellipse cx="78" cy="60" rx="9" ry="11" fill="#ffffff"/>
    <circle cx="58" cy="62" r="4.6" fill="#1e1b4b"/>
    <circle cx="82" cy="62" r="4.6" fill="#1e1b4b"/>
    <circle cx="56.4" cy="59.6" r="1.5" fill="#ffffff"/>
    <circle cx="80.4" cy="59.6" r="1.5" fill="#ffffff"/>
  </g>
