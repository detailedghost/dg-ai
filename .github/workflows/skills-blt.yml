---
name: Skills - Build, Lint, and Test

on:
  pull_request:
    paths:
      - pkg/skills-cli/**
      - pkg/common/**
      - pkg/skills/**
      - pkg/skills-test/**
      - .github/workflows/skills-blt.yml
  workflow_call:

jobs:
  skills-blt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (root — wires workspace symlinks, skip extension postinstall)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint (common)
        working-directory: pkg/common
        run: bun run lint

      - name: Test (common)
        working-directory: pkg/common
        run: bun test

      - name: Lint (skills-cli)
        working-directory: pkg/skills-cli
        run: bun run lint

      - name: Test (skills-cli)
        working-directory: pkg/skills-cli
        run: bun test

      - name: Build (skills-cli)
        working-directory: pkg/skills-cli
        run: bun run build

      - name: Lint (skills-test)
        working-directory: pkg/skills-test
        run: bun run lint

      - name: Test (skills-test — install logic + skill manifests + CLI smoke)
        working-directory: pkg/skills-test
        run: bun test
