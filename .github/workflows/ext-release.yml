name: Ext - Release

# Builds and publishes an ext-vX.X.X release whenever extension or browser-skill
# source changes land on master. Runs BLT first so a broken build never ships.
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - pkg/extension/**
      - pkg/skills-cli/**
      - .github/workflows/ext-release.yml

permissions:
  contents: write  # create release + tag

jobs:
  blt:
    uses: ./.github/workflows/ext-blt.yml

  release:
    needs: blt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        working-directory: pkg/extension
        run: bun install --frozen-lockfile

      - name: Build + zip (chrome + firefox)
        working-directory: pkg/extension
        run: |
          bun run zip
          bun run zip:firefox

      - name: Read extension version
        id: ver
        run: echo "version=$(node -p "require('./pkg/extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish release (skip if version already exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.ver.outputs.version }}"
          tag="ext-v${version}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — build validated, nothing to publish."
            exit 0
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes "Automated build of the dg-ai-extension ($tag)." \
            "pkg/extension/.output/dg-ai-extension-${version}-chrome.zip" \
            "pkg/extension/.output/dg-ai-extension-${version}-firefox.zip"

      - name: Clean up on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf pkg/extension/.output
          version=$(node -p "require('./pkg/extension/package.json').version" 2>/dev/null || echo "")
          if [ -n "$version" ]; then
            tag="ext-v${version}"
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
            gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" --method DELETE 2>/dev/null || true
          fi
