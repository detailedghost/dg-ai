<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dg-ai-extension — Options</title>
    <style>
      body { font: 14px system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
      select { width: 100%; padding: 0.4rem; font: inherit; box-sizing: border-box; }
      button { margin-top: 1.25rem; padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
      #status { margin-left: 0.75rem; color: green; }
      p { color: #666; }
    </style>
  </head>
  <body>
    <h1>dg-ai-extension</h1>
    <p>Tabs are grouped only when opened with a <code>_tab_group</code> marker
       (the CLI adds it). The group name comes from that marker; here you pick the color.</p>
    <label for="color">Group color</label>
    <select id="color">
      <option>grey</option><option>blue</option><option>red</option>
      <option>yellow</option><option>green</option><option>pink</option>
      <option>purple</option><option>cyan</option><option>orange</option>
    </select>
    <button id="save" type="button">Save</button><span id="status"></span>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
